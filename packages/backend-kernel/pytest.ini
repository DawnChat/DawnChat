[pytest]
# 异步测试模式
asyncio_mode = auto

# 测试路径
testpaths = tests

# Python 路径
pythonpath = .

# 输出格式
addopts = -v --tb=short --strict-markers

# 测试标记
markers =
    unit: 单元测试，无外部依赖，可在沙箱运行
    integration: 集成测试，需要真实服务（CAO Server）
    e2e: 端到端测试，需要完整环境（后端 + 可选 CAO）
    e2e_mock: E2E Mock 模式，跳过 AI 执行
    e2e_live: E2E Live 模式，真实 AI 执行
    requires_backend: 需要后端服务运行
    requires_cao: 需要 CAO Server 运行
    requires_network: 需要网络访问
    slow: 执行时间较长的测试
    v2: V2 Pipeline 引擎测试（隔离于 V1）
    golden: Golden scenario 测试（核心语义验证）
    api_integration: V2 API 集成测试（模拟完整前端请求流程）
    stability: 稳定性测试（默认少量迭代，通过 STABILITY_ITERATIONS 环境变量控制）
    stability_full: 完整稳定性测试（Nightly 专用，完整迭代次数验证）
    api_v2: V2 API 边界测试（Schema 契约 + 端点功能）
    ws_v2: V2 WebSocket 测试
    fullstack_v2: V2 Fullstack 核心链路测试

# 稳定性测试配置说明：
# - 默认 CI: STABILITY_ITERATIONS=3 pytest -m v2
# - Nightly: STABILITY_ITERATIONS=30 pytest -m v2

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

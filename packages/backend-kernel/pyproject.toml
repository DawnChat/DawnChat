[project]
name = "dawnchat-backend"
version = "0.1.0"
description = ""
authors = [
    {name = "DawnChat Team"}
]
readme = "README.md"
requires-python = ">=3.10,<3.15"
dependencies = [
    "fastapi (>=0.125.0,<0.126.0)",
    "uvicorn (>=0.37.0,<0.38.0)",
    "websockets (>=12.0,<16.0)",
    "requests (>=2.32.5,<3.0.0)",
    "httpx (>=0.27.0,<1.0.0)",
    "socksio (>=1.0.0,<2.0.0)",
    "pydantic (>=2.0.0,<3.0.0)",
    "sqlmodel (>=0.0.27,<0.0.28)",
    "aiosqlite (>=0.20.0,<1.0.0)",
    "cryptography (>=44.0.0,<45.0.0)",
    "keyring (>=25.6.0,<26.0.0)",
    "litellm (>=1.79.1,<1.80.14)",
    "ffmpeg-python (>=0.2.0,<0.3.0)",
    "huggingface_hub (>=1.2.3,<2.0.0)",
    "tqdm (>=4.66.0,<5.0.0)",
    "aiohttp (>=3.11.8,<4.0.0)",
    "pyyaml (>=6.0.1,<7.0.0)",
    "instructware-tools (>=0.1.0,<1.0.0)",
    "ripgrep (>=15.0.0,<20.0.0)",
    "json-repair (>=0.55.1,<1.0.0)",
    "Pillow>=10.0.0",
    "scenedetect>=0.6.6",
    # Restate 编排引擎 (暂时禁用，等需要时再启用)
    # "restate-sdk (>=0.5.0,<1.0.0)",
    "watchdog (>=6.0.0,<7.0.0)",
    "sherpa-onnx (>=1.12.20,<1.13.0)",
    "python-multipart (>=0.0.22,<0.0.23)",
    "ddgs (>=9.12.1,<10.0.0)"
]


[tool.poetry]
package-mode = false


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pyinstaller (>=6.16.0,<7.0.0)",
    "cython (>=3.0.0,<4.0.0)",
    "pytest (>=8.0.0,<9.0.0)",
    "pytest-asyncio (>=1.3.0,<2.0.0)",
    "pytest-cov (>=6.0.0,<7.0.0)",
    "ruff (>=0.14.10,<0.15.0)",
    "mypy (>=1.8.0,<2.0.0)",
    "pyright (>=1.1.408,<2.0.0)"
]

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["app", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]
per-file-ignores = { "**/__init__.py" = ["F401"] }

[tool.ruff.lint.isort]
known-first-party = ["app"]
combine-as-imports = true
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

# 测试标记
markers = [
    "unit: 单元测试，无外部依赖，可在沙箱运行",
    "integration: 集成测试，需要真实服务（CAO Server）",
    "e2e: 端到端测试，需要完整环境（后端 + 可选 CAO）",
    "e2e_mock: E2E Mock 模式，跳过 AI 执行",
    "e2e_live: E2E Live 模式，真实 AI 执行",
    "requires_backend: 需要后端服务运行",
    "requires_cao: 需要 CAO Server 运行",
    "requires_network: 需要网络访问",
    "slow: 执行时间较长的测试",
    "v2: V2 Pipeline 引擎测试（隔离于 V1）",
    "golden: Golden scenario 测试（核心语义验证）",
    "api_integration: V2 API 集成测试（模拟完整前端请求流程）",
    "sqlite_only: 仅 SQLite 持久化相关测试",
    "memory_only: 仅 InMemoryEventStore 特定测试",
]

# 过滤器
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

# 默认运行所有测试（通过命令行参数 -m 可以指定）
addopts = "--strict-markers -v"

[tool.mypy]
python_version = "3.11"
pretty = true
ignore_missing_imports = true
no_implicit_optional = false
warn_unused_ignores = true
warn_unused_configs = true
follow_imports = "skip"
disable_error_code = ["import-untyped"]
exclude = "^(\\./)?(Library/|android-adb/|scripts/|tests/.+|app/(agent|pipeline(_v2)?)(/|$)|dawnchat-plugins/official-plugins/(comfyui|vibevoice|cosyvoice)/src/(comfyui|vibevoice|cosyvoice|comfyui_wrapper|vibevoice_worker|cosyvoice_worker)(/|$)|dawnchat-plugins/official-plugins/cosyvoice/src/third_party(/|$))"

[[tool.mypy.overrides]]
module = ["requests"]
ignore_missing_imports = true

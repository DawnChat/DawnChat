name: macos-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      sign_and_notarize:
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  build-macos-dmg:
    runs-on: macos-14
    env:
      IS_TAG_PUSH: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
      IS_RC_TAG: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-rc') }}
      SHOULD_SIGN: ${{ ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && inputs.sign_and_notarize == true)) && secrets.MACOS_CERT_P12_B64 != '' && secrets.MACOS_CERT_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
      SHOULD_NOTARIZE: ${{ ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && inputs.sign_and_notarize == true)) && secrets.MACOS_CERT_P12_B64 != '' && secrets.MACOS_CERT_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.ASC_API_KEY_P8_B64 != '' && secrets.ASC_KEY_ID != '' && secrets.ASC_ISSUER_ID != '' && secrets.APPLE_TEAM_ID != '' }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL != '' && secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY != '' && secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
      KEYCHAIN_NAME: dawnchat-build.keychain
      KEYCHAIN_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      NOTARY_PROFILE: dawnchat-notary
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch plugin workspace
        run: |
          git clone --depth 1 --branch main https://github.com/chaxiu/dawnchat-plugins.git dawnchat-plugins

      - name: Verify plugin workspace
        run: |
          test -d dawnchat-plugins/sdk
          test -d dawnchat-plugins/official-plugins

      - name: Ensure signing is available for tag builds
        if: env.IS_TAG_PUSH == 'true' && env.SHOULD_SIGN != 'true'
        run: |
          echo "Tag build requires signing secrets, but signing is unavailable."
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify frontend build env
        run: |
          require_env() {
            local name="$1"
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required frontend build env: $name"
              exit 1
            fi
          }

          require_env VITE_SUPABASE_URL
          require_env VITE_SUPABASE_ANON_KEY

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry poetry-plugin-export
          poetry --version
          poetry export --help > /dev/null

      - name: Cache runtime assets
        uses: actions/cache@v4
        with:
          path: |
            runtime-assets
            .cache/runtime-assets
          key: macos-runtime-assets-${{ runner.os }}-aarch64-apple-darwin-${{ hashFiles('scripts/download-runtime-assets.sh') }}
          restore-keys: |
            macos-runtime-assets-${{ runner.os }}-aarch64-apple-darwin-

      - name: Download runtime assets
        env:
          DAWNCHAT_RUNTIME_ASSETS_BASE_URL: ${{ vars.DAWNCHAT_RUNTIME_ASSETS_BASE_URL }}
          DAWNCHAT_BUN_BASE_URL: ${{ vars.DAWNCHAT_BUN_BASE_URL }}
          DAWNCHAT_UV_BASE_URL: ${{ vars.DAWNCHAT_UV_BASE_URL }}
          DAWNCHAT_OPENCODE_BASE_URL: ${{ vars.DAWNCHAT_OPENCODE_BASE_URL }}
        run: ./scripts/download-runtime-assets.sh --bun --uv --opencode --platform aarch64-apple-darwin

      - name: Normalize runtime binary permissions
        run: |
          chmod +x runtime-assets/bun-bin/bun-darwin-aarch64/bun 2>/dev/null || true
          chmod +x runtime-assets/uv-binary/uv-aarch64-apple-darwin/uv 2>/dev/null || true
          chmod +x runtime-assets/uv-binary/uv-aarch64-apple-darwin/uvx 2>/dev/null || true
          chmod +x runtime-assets/opencode-bin/opencode-darwin-arm64/opencode 2>/dev/null || true

      - name: Verify runtime assets
        run: |
          require_executable() {
            local path="$1"
            if [[ ! -f "$path" ]]; then
              echo "Missing file: $path"
              exit 1
            fi
            if [[ ! -x "$path" ]]; then
              echo "File is not executable: $path"
              ls -l "$path" || true
              exit 1
            fi
          }
          require_file() {
            local path="$1"
            if [[ ! -f "$path" ]]; then
              echo "Missing file: $path"
              exit 1
            fi
          }

          require_executable runtime-assets/bun-bin/bun-darwin-aarch64/bun
          require_executable runtime-assets/uv-binary/uv-aarch64-apple-darwin/uv
          require_executable runtime-assets/uv-binary/uv-aarch64-apple-darwin/uvx
          require_executable runtime-assets/opencode-bin/opencode-darwin-arm64/opencode

      - name: Prepare signing assets
        if: env.SHOULD_SIGN == 'true'
        env:
          MACOS_CERT_P12_B64: ${{ secrets.MACOS_CERT_P12_B64 }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id-app.p12"
          python - <<'PY'
          import base64
          import os
          from pathlib import Path
          cert = Path(os.environ["RUNNER_TEMP"]) / "developer-id-app.p12"
          cert.write_bytes(base64.b64decode(os.environ["MACOS_CERT_P12_B64"]))
          PY
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain-db
          security default-keychain -s "$KEYCHAIN_NAME"
          security import "$CERT_PATH" -k "$KEYCHAIN_NAME" -P "${{ secrets.MACOS_CERT_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

      - name: Prepare notarization credentials
        if: env.SHOULD_NOTARIZE == 'true'
        env:
          ASC_API_KEY_P8_B64: ${{ secrets.ASC_API_KEY_P8_B64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          python - <<'PY'
          import base64
          import os
          from pathlib import Path
          key = Path(os.environ["RUNNER_TEMP"]) / f'AuthKey_{os.environ["ASC_KEY_ID"]}.p8'
          key.write_bytes(base64.b64decode(os.environ["ASC_API_KEY_P8_B64"]))
          PY
          xcrun notarytool store-credentials "$NOTARY_PROFILE" --key "$KEY_PATH" --key-id "${{ secrets.ASC_KEY_ID }}" --issuer "${{ secrets.ASC_ISSUER_ID }}"

      - name: Build unsigned dmg
        if: env.SHOULD_SIGN != 'true'
        run: |
          ./build.sh \
            --mode release \
            --platform aarch64-apple-darwin \
            --optimize \
            --dmg-only

      - name: Build signed dmg
        if: env.SHOULD_SIGN == 'true'
        run: |
          if [[ "${SHOULD_NOTARIZE}" == "true" ]]; then
            ./build.sh \
              --mode release \
              --platform aarch64-apple-darwin \
              --optimize \
              --dmg-only \
              --sign-macos \
              --notarize-macos \
              --notary-profile "$NOTARY_PROFILE" \
              --signing-identity "${{ secrets.APPLE_SIGNING_IDENTITY }}"
          else
            ./build.sh \
              --mode release \
              --platform aarch64-apple-darwin \
              --optimize \
              --dmg-only \
              --sign-macos \
              --signing-identity "${{ secrets.APPLE_SIGNING_IDENTITY }}"
          fi

      - name: Resolve artifact path
        id: artifact
        run: |
          DMG_PATH="$(ls -t apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dawnchat-macos-dmg
          path: ${{ steps.artifact.outputs.dmg_path }}
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        if: env.SHOULD_SIGN == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.artifact.outputs.dmg_path }}
          prerelease: ${{ env.IS_RC_TAG == 'true' }}

      - name: Cleanup keychain
        if: always() && env.SHOULD_SIGN == 'true'
        run: security delete-keychain "$KEYCHAIN_NAME" || true

name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend-kernel
    steps:
      - uses: actions/checkout@v4
      - name: Fetch plugin workspace
        working-directory: ${{ github.workspace }}
        run: ./scripts/download-dawnchat-plugins.sh
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install poetry
      - run: poetry install --no-interaction --no-root
      - run: poetry run ruff check app
      - run: poetry run mypy app
      - run: poetry run pyright -p ../../pyrightconfig.json
      - run: poetry run pytest tests/unit/plugins/test_models.py -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch plugin workspace
        run: ./scripts/download-dawnchat-plugins.sh
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # 插件侧只维护 bun.lock：在 assistant-workspace 用 bun 装依赖并构建 dist，再 vue-tsc
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: pnpm run build:assistant-sdk-for-host
      - run: pnpm --filter @dawnchat/frontend run typecheck
      - run: pnpm --filter @dawnchat/frontend run test:run src/composables/__tests__/useBackendStatus.spec.ts

  assistant-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch plugin workspace
        run: ./scripts/download-dawnchat-plugins.sh
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
        working-directory: dawnchat-plugins/assistant-workspace
      - run: bun run verify
        working-directory: dawnchat-plugins/assistant-workspace

  tauri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch plugin workspace
        run: ./scripts/download-dawnchat-plugins.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
        working-directory: apps/desktop/src-tauri

name: codeql

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  precheck:
    name: Check code scanning availability
    runs-on: ubuntu-latest
    outputs:
      code_scanning_enabled: ${{ steps.check.outputs.code_scanning_enabled }}
    steps:
      - name: Detect whether CodeQL upload is supported
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.repository.private }}" = "false" ]; then
            echo "code_scanning_enabled=true" >> "$GITHUB_OUTPUT"
            echo "Public repository detected. Code scanning upload is available."
            exit 0
          fi

          repo_response="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}")"

          advanced_security_status="$(echo "$repo_response" | jq -r '.security_and_analysis.advanced_security.status // empty')"
          if [ "$advanced_security_status" = "enabled" ]; then
            echo "code_scanning_enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Advanced Security is enabled for this private repository."
          else
            echo "code_scanning_enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Advanced Security is not enabled for this private repository. Skipping CodeQL analyze/upload."
          fi

  analyze:
    name: Analyze
    needs: precheck
    if: needs.precheck.outputs.code_scanning_enabled == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  codeql-unavailable:
    name: CodeQL unavailable
    needs: precheck
    if: needs.precheck.outputs.code_scanning_enabled != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped CodeQL run
        run: |
          echo "CodeQL upload is unavailable for this repository."
          echo "For private repositories, enable GitHub Advanced Security to use code scanning."
